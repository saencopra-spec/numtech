<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechStore</title>

<!-- Enlace al CSS -->
<link rel="stylesheet" href="css/styles.css">  

</head>

<body>

<!-- ===== CARRUSEL ===== -->
<section class="carousel-container">
    <div class="carousel-box">

        <div class="carousel-track" id="track">
            
            <div class="carousel-item">
                <h2>🔥 Oferta del día</h2>
                <p>Pilas recargables de larga duración</p>
                <button>Ver más</button>
            </div>

            <div class="carousel-item">
                <h2>📷 Seguridad Inteligente</h2>
                <p>Cámaras Wi-Fi con visión nocturna</p>
                <button>Ver más</button>
            </div>

            <div class="carousel-item">
                <h2>🔌 Conectividad Total</h2>
                <p>Cables y adaptadores para todo</p>
                <button>Ver más</button>
            </div>

        </div>

        <button class="btn prev" onclick="moveSlide(-1)">❮</button>
        <button class="btn next" onclick="moveSlide(1)">❯</button>

    </div>
</section>

<script src="script.js"></script>

</body>
</html>
